esphome:
  name: huippuimuri

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: DEBUG

api:

ota:
  platform: esphome

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 100
    - ssid: !secret wifi2_ssid
      password: !secret wifi2_password
      priority: 50

web_server:
  port: 80

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    update_interval: 60s
  - platform: pulse_counter
    pin: 
      number: GPIO47
      mode: INPUT_PULLUP
    name: "Puhaltimen nopeus"
    unit_of_measurement: "RPM"
    update_interval: 5s

output:
  - platform: ledc
    pin: GPIO21
    id: puhallin_pwm
    inverted: true
    frequency: 5000 Hz

fan:
  - platform: speed
    output: puhallin_pwm
    name: "Huippuimurin säätö"