esphome:
  name: huippuimuri

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: DEBUG

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

sensor:
  - platform: pulse_counter
    pin: 
      number: GPIO47
      mode: INPUT_PULLUP
    name: "Puhaltimen nopeus"
    unit_of_measurement: "RPM"
    update_interval: 5s

output:
  - platform: ledc
    pin: GPIO21
    id: puhallin_pwm
    inverted: true
    frequency: 5000 Hz

fan:
  - platform: speed
    output: puhallin_pwm
    name: "Huippuimurin säätö"